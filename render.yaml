services:
  - type: web
    name: ai-trader-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars: &ai_trader_env
      - key: AI_TRADER_API_TOKEN
        sync: false
      - key: AI_TRADER_PROCESS_ROLE
        value: render
      - key: AI_TRADER_DISABLE_API_BACKGROUND_WORKERS
        value: "true"
      - key: AI_TRADER_REQUIRE_POSTGRES_IN_HOSTED
        value: "true"
      - key: AI_TRADER_DATABASE_BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_BASE_URL
        value: https://data.alpaca.markets
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AUTO_PAPER_TRADING
        value: "false"
      - key: ALPACA_AUTO_TRADING
        value: "false"
      - key: KRAKEN_AUTO_TRADING
        value: "false"
      - key: COINBASE_AUTO_TRADING
        value: "false"
      - key: BINANCE_AUTO_TRADING
        value: "false"
      - key: IBKR_AUTO_TRADING
        value: "false"
      - key: AUTO_TRADE_MIN_CONFIDENCE
        value: "0.85"
      - key: AUTO_TRADE_MIN_PHILOSOPHY_FIT
        value: "0.85"
      - key: MAX_AUTO_TRADE_AMOUNT
        value: "25"
      - key: DEFAULT_STOP_LOSS_PCT
        value: "0.03"
      - key: MAX_STOP_LOSS_PCT
        value: "0.05"
      - key: CRYPTO_MAX_AUTO_TRADE_AMOUNT
        value: "10"
      - key: CRYPTO_DEFAULT_STOP_LOSS_PCT
        value: "0.02"
      - key: CRYPTO_MAX_STOP_LOSS_PCT
        value: "0.05"
      - key: KRAKEN_SANDBOX_MODE
        value: "true"
      - key: KRAKEN_TRADING_ENABLED
        value: "false"
      - key: KRAKEN_LIVE_TRADING_APPROVED
        value: "false"
      - key: KRAKEN_SUBMIT_REAL_ORDERS
        value: "false"
      - key: KRAKEN_TRADING_ALLOCATION_GBP
        value: "100"
      - key: KRAKEN_MAX_ORDER_GBP
        value: "5"
      - key: KRAKEN_MIN_ORDER_GBP
        value: "1"
      - key: KRAKEN_MAX_OPEN_TRADES
        value: "1"
      - key: KRAKEN_ALLOWED_PAIRS
        value: XBTGBP,ETHGBP,SOLGBP
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_PRIVATE_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: COINBASE_TRADING_ENABLED
        value: "false"
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false
      - key: COINBASE_PORTFOLIO_ID
        sync: false
      - key: RESEARCH_SCHEDULER_ENABLED
        value: "false"
      - key: RESEARCH_SCHEDULER_INTERVAL_MINUTES
        value: "60"
      - key: RESEARCH_SCHEDULER_LIMIT
        value: "30"
      - key: AUTO_EXECUTION_INTERVAL_SECONDS
        value: "60"
      - key: PAPER_TRADING_ONLY
        value: "true"
      - key: MIN_CONFIDENCE_SCORE
        value: "0.85"
      - key: MAX_RISK_PER_TRADE_PCT
        value: "0.01"
      - key: MAX_DAILY_LOSS_PCT
        value: "0.03"
      - key: MAX_OPEN_POSITIONS
        value: "3"

  - type: worker
    name: ai-trader-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-worker --sleep-seconds 60
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-premarket-equity
    env: docker
    schedule: "30 12 * * 1-5"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job premarket-equity --limit 30
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-market-open-equity
    env: docker
    schedule: "45 13 * * 1-5"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job market-open-equity --limit 30
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-midday-equity
    env: docker
    schedule: "30 16 * * 1-5"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job midday-equity --limit 30
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-market-close-equity
    env: docker
    schedule: "50 19 * * 1-5"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job market-close-equity --limit 30
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-overnight-crypto
    env: docker
    schedule: "15 */2 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job overnight-crypto --limit 20
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-daily-learning
    env: docker
    schedule: "10 21 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job daily-learning
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-daily-report
    env: docker
    schedule: "20 21 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job daily-report --report-type daily
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-weekly-report
    env: docker
    schedule: "45 21 * * 5"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job weekly-report --report-type weekly
    envVars: *ai_trader_env

  - type: cron
    name: ai-trader-monthly-report
    env: docker
    schedule: "15 22 1 * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m ai_trader run-job monthly-report --report-type monthly
    envVars: *ai_trader_env
