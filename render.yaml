services:
  - type: web
    name: ai-trader-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    disk:
      name: ai-trader-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: AI_TRADER_API_TOKEN
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_BASE_URL
        value: https://data.alpaca.markets
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AUTO_PAPER_TRADING
        value: "false"
      - key: ALPACA_AUTO_TRADING
        value: "false"
      - key: KRAKEN_AUTO_TRADING
        value: "false"
      - key: COINBASE_AUTO_TRADING
        value: "false"
      - key: BINANCE_AUTO_TRADING
        value: "false"
      - key: IBKR_AUTO_TRADING
        value: "false"
      - key: AUTO_TRADE_MIN_CONFIDENCE
        value: "0.85"
      - key: AUTO_TRADE_MIN_PHILOSOPHY_FIT
        value: "0.85"
      - key: MAX_AUTO_TRADE_AMOUNT
        value: "25"
      - key: DEFAULT_STOP_LOSS_PCT
        value: "0.03"
      - key: MAX_STOP_LOSS_PCT
        value: "0.05"
      - key: CRYPTO_MAX_AUTO_TRADE_AMOUNT
        value: "10"
      - key: CRYPTO_DEFAULT_STOP_LOSS_PCT
        value: "0.02"
      - key: CRYPTO_MAX_STOP_LOSS_PCT
        value: "0.05"
      - key: KRAKEN_SANDBOX_MODE
        value: "true"
      - key: KRAKEN_TRADING_ENABLED
        value: "false"
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_PRIVATE_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: COINBASE_TRADING_ENABLED
        value: "false"
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false
      - key: COINBASE_PORTFOLIO_ID
        sync: false
      - key: RESEARCH_SCHEDULER_ENABLED
        value: "true"
      - key: RESEARCH_SCHEDULER_INTERVAL_MINUTES
        value: "60"
      - key: RESEARCH_SCHEDULER_LIMIT
        value: "30"
      - key: PAPER_TRADING_ONLY
        value: "true"
      - key: MIN_CONFIDENCE_SCORE
        value: "0.85"
      - key: MAX_RISK_PER_TRADE_PCT
        value: "0.01"
      - key: MAX_DAILY_LOSS_PCT
        value: "0.03"
      - key: MAX_OPEN_POSITIONS
        value: "3"
